<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Clinical Differentials</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function(){
      const m = localStorage.getItem('ui-theme');
      const mode = (m === 'dark' || m === 'light') ? m : 'light';
      document.documentElement.setAttribute('data-theme', mode);
      document.documentElement.style.colorScheme = mode;
    })();
  </script>
  <link rel="stylesheet" href="differentials_style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <a class="brand__home" href="../index.html" aria-label="Home">Clerkship Tools</a>
      <h1 class="brand__title">Clinical Differentials</h1>
      <p class="brand__subtitle">Fast differential lookup across clinical, biochemical, and hematological presentations.</p>
    </div>

    <div class="controls controls--simple controls--row1">
      <button id="btnOpenFilters" class="btn ghost" aria-haspopup="dialog" aria-controls="drawer">Filters</button>
      <input id="q" class="search" type="text" autocomplete="off"
             placeholder="Search presentations, etiologies, systems" />
      <div class="filters">
        <label class="sr-only" for="section">Section</label>
        <select id="section">
          <option value="">All sections</option>
          <option>Clinical Presentations</option>
          <option>Biochemical Presentations</option>
          <option>Hematological Presentations</option>
        </select>
      </div>
    </div>
  </header>

  <!-- Drawer -->
  <div id="drawer" class="drawer" aria-hidden="true" role="dialog" aria-label="Filters">
    <div id="drawerScrim" class="drawer__scrim" tabindex="-1"></div>
    <aside class="drawer__panel" role="document">
      <div class="drawer__header">
        <h2>Filters</h2>
        <button id="btnCloseFilters" class="btn icon" aria-label="Close filters">✕</button>
      </div>

      <div class="drawer__content">
        <div class="filter-block">
          <label for="sectionDrawer">Section</label>
          <select id="sectionDrawer">
            <option value="">All sections</option>
            <option>Clinical Presentations</option>
            <option>Biochemical Presentations</option>
            <option>Hematological Presentations</option>
          </select>
        </div>

        <div class="filter-block">
          <p class="filter-block__label">Systems</p>
          <div id="systemChips" class="chips chips--drawer" aria-label="System filters"></div>
        </div>
      </div>

      <div class="drawer__footer">
        <button id="btnClearFilters" class="btn ghost">Clear</button>
        <button id="btnApplyFilters" class="btn primary">Apply</button>
      </div>
    </aside>
  </div>

  <main class="app-main">
    <div id="error" class="error" role="alert" hidden></div>

    <div id="layoutShell" class="layout-shell">
      <section class="content-column">
        <section id="results" class="grid" aria-live="polite">
          <!-- Presentation cards render here -->
        </section>
      </section>

      <aside id="detailPanel" class="detail-panel" aria-label="Differential details">
        <header class="detail-panel__header">
          <div class="detail-panel__intro">
            <p class="detail-panel__eyebrow">Selected presentation</p>
            <h2 id="detailTitle" class="detail-panel__title">No selection</h2>
          </div>
          <button id="btnCloseDetail" class="btn icon detail-panel__close" aria-label="Close details panel">✕</button>
        </header>

        <div id="detailMeta" class="detail-panel__meta" hidden>
          <span id="detailBadge" class="badge">—</span>
          <span id="detailCount"></span>
        </div>

        <div id="detailEmpty" class="detail-empty">
          <p>Select a presentation card to review etiologies.</p>
        </div>

        <div id="detailBody" class="detail-panel__body" hidden></div>
      </aside>
    </div>
  </main>

  <div id="detailScrim" class="detail-scrim" hidden></div>

  <script src="differentials_app.js"></script>
</body>
</html>
